<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速共時 | 13月亮曆的小共時</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 暖灰亞麻色背景 */
            background: #E8E4DF;
            font-family: 'Noto Serif TC', serif;
            color: #3a3632;
            overflow-x: hidden;
            position: relative;
        }

        /* 細微紋理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        /* 返回連結 */
        .back-link {
            position: fixed;
            top: 24px;
            left: 24px;
            font-size: 15px;
            font-weight: 700;
            color: #6a655c;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
            z-index: 100;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.4);
        }

        .back-link:hover {
            color: #4a4540;
        }

        .back-link::before {
            content: '←';
            margin-right: 8px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 60px 24px;
            max-width: 640px;
            width: 100%;
            min-height: 100vh;
        }

        /* 石板底襯 - Plate 結構 */
        .plate {
            background: #D5D0C8;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 520px;
            /* 岩石質感邊框 */
            border: 3px solid #c5c0b8;
            box-shadow:
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                inset 0 -2px 4px rgba(0, 0, 0, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.12),
                0 2px 8px rgba(0, 0, 0, 0.08);
            /* 細微紋理 */
            background-image:
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(0,0,0,0.03) 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-color: #D5D0C8;
            background-blend-mode: overlay, soft-light;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
        }

        /* 階段容器 */
        .stage {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 0.8s ease;
            width: 100%;
            gap: 28px;
        }

        .stage.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==================== 抽卡階段 ==================== */
        .stage-title {
            font-size: 36px;
            font-weight: 900;
            color: #2d2a26;
            letter-spacing: 0.1em;
            /* 內凹刻印效果 */
            text-shadow:
                1px 1px 1px rgba(255, 255, 255, 0.4),
                -1px -1px 1px rgba(0, 0, 0, 0.12);
        }

        .stage-subtitle {
            font-size: 15px;
            font-weight: 600;
            color: #A84840;
            letter-spacing: 0.2em;
            margin-top: -8px;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.3);
        }

        .stage-desc {
            font-size: 17px;
            font-weight: 500;
            color: #5a5650;
            line-height: 2;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .kin-display {
            font-size: 56px;
            font-weight: 900;
            color: #3a3632;
            letter-spacing: 0.08em;
            text-shadow:
                2px 2px 2px rgba(255, 255, 255, 0.4),
                -1px -1px 1px rgba(0, 0, 0, 0.1);
        }

        .kin-display.rolling {
            animation: kinPulse 0.12s ease infinite;
        }

        @keyframes kinPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* 石碑風格按鈕 */
        .stone-btn {
            padding: 18px 48px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'Noto Serif TC', serif;
            color: #f5f0eb;
            background: linear-gradient(135deg, #A84840 0%, #8a3a34 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            letter-spacing: 0.12em;
            transition: all 0.3s ease;
            text-shadow:
                1px 1px 1px rgba(255, 255, 255, 0.2),
                -1px -1px 1px rgba(0, 0, 0, 0.2);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 4px 12px rgba(168, 72, 64, 0.35);
        }

        .stone-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #8a3a34 0%, #6a2a24 100%);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 8px 20px rgba(168, 72, 64, 0.4);
        }

        .stone-btn:active {
            transform: translateY(0);
        }

        .stone-btn.secondary {
            background: linear-gradient(135deg, #8A847A 0%, #6a655c 100%);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 4px 12px rgba(106, 101, 92, 0.35);
        }

        .stone-btn.secondary:hover {
            background: linear-gradient(135deg, #6a655c 0%, #5a554c 100%);
        }

        /* ==================== 結果階段 ==================== */

        /* 調性符號容器 */
        .tone-symbol {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px;
            min-height: 60px;
        }

        .tone-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .tone-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #3a3632;
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.3),
                0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .tone-bar {
            width: 48px;
            height: 10px;
            border-radius: 5px;
            background: #3a3632;
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.3),
                0 1px 2px rgba(0, 0, 0, 0.2);
        }

        /* 圖騰圖片 */
        .seal-image {
            width: 180px;
            height: 180px;
            object-fit: contain;
            border-radius: 16px;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.15));
        }

        /* KIN 結果顯示 */
        .result-kin {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-shadow:
                2px 2px 2px rgba(255, 255, 255, 0.4),
                -1px -1px 1px rgba(0, 0, 0, 0.1);
        }

        .result-kin.kin-red { color: #A84840; }
        .result-kin.kin-white { color: #5a5650; }
        .result-kin.kin-blue { color: #4A7590; }
        .result-kin.kin-yellow { color: #A89040; }

        .result-name {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-shadow:
                1px 1px 1px rgba(255, 255, 255, 0.4),
                -1px -1px 1px rgba(0, 0, 0, 0.08);
        }

        .result-name.kin-red { color: #A84840; }
        .result-name.kin-white { color: #5a5650; }
        .result-name.kin-blue { color: #4A7590; }
        .result-name.kin-yellow { color: #A89040; }

        /* 訊息區塊 */
        .message-box {
            background: #f5f3f0;
            border-radius: 12px;
            padding: 24px 28px;
            width: 100%;
            border: 2px solid rgba(0, 0, 0, 0.06);
            box-shadow:
                inset 0 1px 3px rgba(0, 0, 0, 0.04),
                0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .message-title {
            font-size: 13px;
            font-weight: 700;
            color: #8a857a;
            letter-spacing: 0.2em;
            margin-bottom: 12px;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .message-text {
            font-size: 16px;
            font-weight: 500;
            line-height: 2;
            color: #4a4540;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        /* RWD - 手機版 */
        @media (max-width: 520px) {
            .container {
                padding: 48px 16px;
            }

            .plate {
                padding: 36px 24px;
                border-radius: 20px;
                width: 90%;
            }

            .stage-title {
                font-size: 28px;
            }

            .stage-subtitle {
                font-size: 13px;
            }

            .stage-desc {
                font-size: 15px;
            }

            .kin-display {
                font-size: 44px;
            }

            .stone-btn {
                padding: 16px 36px;
                font-size: 15px;
            }

            .seal-image {
                width: 150px;
                height: 150px;
            }

            .result-kin {
                font-size: 36px;
            }

            .result-name {
                font-size: 22px;
            }

            .message-box {
                padding: 20px 22px;
            }

            .message-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">返回</a>

    <div class="container">
        <div class="plate">
            <!-- 抽卡階段 -->
            <div class="stage stage-draw active" id="stageDraw">
                <h1 class="stage-title">快速共時</h1>
                <p class="stage-subtitle">啟動</p>
                <p class="stage-desc">
                    跟著直覺，<br>
                    在你覺得對的時刻按下。
                </p>
                <div class="kin-display rolling" id="kinDisplay">KIN 1</div>
                <button class="stone-btn" onclick="stopDraw()">抽取印記</button>
            </div>

            <!-- 結果階段 -->
            <div class="stage stage-result" id="stageResult">
                <!-- 調性符號 -->
                <div class="tone-symbol" id="toneSymbol"></div>

                <!-- 圖騰圖片 -->
                <img class="seal-image" id="sealImage" src="" alt="圖騰">

                <!-- KIN 與名稱 -->
                <div class="result-kin" id="resultKin"></div>
                <div class="result-name" id="resultName"></div>

                <!-- 訊息區塊 -->
                <div class="message-box">
                    <p class="message-title">今日共時訊息</p>
                    <p class="message-text" id="messageText"></p>
                </div>

                <button class="stone-btn secondary" onclick="restart()">再抽一次</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 核心計算：Lookup Table 模式 ====================

        // 年份表 (YearTable) 硬編碼
        const YEAR_TABLE = {
            1858: 62,
            1939: 247,
            2024: 72,
            2025: 177,
            2026: 22
        };

        // 月份表 (MonthTable) 硬編碼
        const MONTH_TABLE = {
            1: 0, 2: 31, 3: 59, 4: 90, 5: 120, 6: 151,
            7: 181, 8: 212, 9: 243, 10: 13, 11: 44, 12: 74
        };

        // 計算年份值（若不在表中則推導）
        function getYearValue(year) {
            if (YEAR_TABLE[year] !== undefined) {
                return YEAR_TABLE[year];
            }
            // 以 1939 為基準推導：每年 +105，大於 260 減 260
            const baseYear = 1939;
            const baseValue = 247;
            const diff = year - baseYear;
            let value = baseValue + (diff * 105);
            while (value > 260) value -= 260;
            while (value <= 0) value += 260;
            return value;
        }

        // 計算 KIN（絕對鎖死規則）
        function calculateKin(year, month, day) {
            const yearValue = getYearValue(year);
            const monthValue = MONTH_TABLE[month];
            let sum = yearValue + monthValue + day;

            // 若總和 > 260，反覆減去 260
            while (sum > 260) {
                sum -= 260;
            }

            return sum;
        }

        // 驗證函數（開發用）
        function validateKinCalculation() {
            // 驗收 A：1939/01/24 → KIN 11
            const testA = calculateKin(1939, 1, 24);
            console.log(`驗收 A: 1939/01/24 = KIN ${testA} (應為 11)`, testA === 11 ? '✓' : '✗');

            // 驗收 B：2026/01/01 → KIN 23
            const testB = calculateKin(2026, 1, 1);
            console.log(`驗收 B: 2026/01/01 = KIN ${testB} (應為 23)`, testB === 23 ? '✓' : '✗');
        }

        // 執行驗證
        validateKinCalculation();

        // ==================== 資料定義 ====================

        // 13 調性名稱
        const TONE_NAMES = [
            "磁性的", "月亮的", "電力的", "自我存在的", "超頻的",
            "韻律的", "共振的", "銀河的", "太陽的", "行星的",
            "光譜的", "水晶的", "宇宙的"
        ];

        // 20 圖騰名稱
        const SEAL_NAMES = [
            "紅龍", "白風", "藍夜", "黃種子", "紅蛇",
            "白世界橋", "藍手", "黃星星", "紅月", "白狗",
            "藍猴", "黃人", "紅天行者", "白巫師", "藍鷹",
            "黃戰士", "紅地球", "白鏡", "藍風暴", "黃太陽"
        ];

        // 訊息資料庫（簡化版）
        const MESSAGES = {
            1: "今天是開始新循環的時刻。滋養你內在的種子，讓它在宇宙的懷抱中萌芽。",
            2: "風帶來靈感的低語。今天適合表達、溝通，讓你的聲音成為宇宙的樂器。",
            3: "夢境是你內在豐盛的泉源。今天去探索那些隱藏的可能性。",
            4: "每一顆種子都蘊含整個宇宙。今天種下意圖，耐心等待它開花。",
            5: "生命力正在你體內流動。今天去感受身體的智慧，讓本能引導你。",
            6: "放下不再需要的，讓死亡成為轉化的禮物。今天練習臣服與釋放。",
            7: "你的雙手擁有療癒的力量。今天用行動完成未竟之事。",
            8: "美是宇宙的語言。今天讓自己成為藝術，優雅地存在。",
            9: "情緒是靈魂的河流。今天讓感受自由流動，淨化你的能量場。",
            10: "無條件的愛是你的本質。今天打開心門，讓愛自由流動。",
            11: "玩耍是靈魂的解藥。今天用幽默看待生命，享受神聖的遊戲。",
            12: "你是自由意志的載體。今天做出與靈魂對齊的選擇。",
            13: "探索是你的天性。今天讓好奇心帶領你發現新的視角。",
            14: "魔法存在於當下。今天用心念創造實相，你是時間的巫師。",
            15: "從高處俯瞰，一切都有意義。今天擴展視野，看見更大的圖景。",
            16: "無懼是智慧的盟友。今天面對挑戰，用勇氣書寫你的故事。",
            17: "地球是你的身體。今天與大地連結，感受同步的脈動。",
            18: "真相在鏡子中閃耀。今天誠實面對自己，接納所有的面向。",
            19: "轉化的力量正在運作。今天接受改變，讓風暴清理舊有的一切。",
            20: "你是無條件的光。今天綻放你的本質，照亮周圍的世界。",
            default: "今天是獨特的一天。敞開心扉，接收宇宙為你準備的訊息。讓直覺引導你的腳步。"
        };

        // ==================== 工具函數 ====================

        function getKinColorClass(kin) {
            const remainder = kin % 4;
            if (remainder === 1) return 'kin-red';
            if (remainder === 2) return 'kin-white';
            if (remainder === 3) return 'kin-blue';
            return 'kin-yellow';
        }

        function getSealNumber(kin) {
            return ((kin - 1) % 20) + 1;
        }

        function getToneNumber(kin) {
            return ((kin - 1) % 13) + 1;
        }

        function getKinName(kin) {
            const toneIndex = getToneNumber(kin) - 1;
            const sealIndex = getSealNumber(kin) - 1;
            return TONE_NAMES[toneIndex] + SEAL_NAMES[sealIndex];
        }

        function getMessage(kin) {
            const sealNumber = getSealNumber(kin);
            return MESSAGES[sealNumber] || MESSAGES.default;
        }

        // ==================== 調性符號繪製（純 CSS） ====================

        function renderToneSymbol(tone) {
            const container = document.getElementById('toneSymbol');
            container.innerHTML = '';

            // 調性符號規則：
            // 1-4: 1-4 個點
            // 5: 1 條橫線
            // 6-9: 1 條橫線 + 1-4 個點
            // 10: 2 條橫線
            // 11-13: 2 條橫線 + 1-3 個點

            if (tone <= 4) {
                // 1-4 個點
                const row = document.createElement('div');
                row.className = 'tone-row';
                for (let i = 0; i < tone; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'tone-dot';
                    row.appendChild(dot);
                }
                container.appendChild(row);
            } else if (tone === 5) {
                // 1 條橫線
                const bar = document.createElement('div');
                bar.className = 'tone-bar';
                container.appendChild(bar);
            } else if (tone <= 9) {
                // 1 條橫線 + 點
                const bar = document.createElement('div');
                bar.className = 'tone-bar';
                container.appendChild(bar);

                const row = document.createElement('div');
                row.className = 'tone-row';
                const dots = tone - 5;
                for (let i = 0; i < dots; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'tone-dot';
                    row.appendChild(dot);
                }
                container.appendChild(row);
            } else if (tone === 10) {
                // 2 條橫線
                for (let i = 0; i < 2; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'tone-bar';
                    container.appendChild(bar);
                }
            } else {
                // 2 條橫線 + 點
                for (let i = 0; i < 2; i++) {
                    const bar = document.createElement('div');
                    bar.className = 'tone-bar';
                    container.appendChild(bar);
                }

                const row = document.createElement('div');
                row.className = 'tone-row';
                const dots = tone - 10;
                for (let i = 0; i < dots; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'tone-dot';
                    row.appendChild(dot);
                }
                container.appendChild(row);
            }
        }

        // ==================== 抽卡邏輯 ====================

        let drawInterval = null;
        let currentKin = 1;
        let drawnKin = null;

        function startKinRolling() {
            const kinDisplay = document.getElementById('kinDisplay');
            kinDisplay.classList.add('rolling');

            drawInterval = setInterval(() => {
                currentKin = Math.floor(Math.random() * 260) + 1;
                kinDisplay.textContent = `KIN ${currentKin}`;
            }, 70);
        }

        function stopDraw() {
            if (!drawInterval) return;

            clearInterval(drawInterval);
            drawInterval = null;

            const kinDisplay = document.getElementById('kinDisplay');
            kinDisplay.classList.remove('rolling');

            drawnKin = currentKin;

            // 短暫停頓後顯示結果
            setTimeout(() => {
                showResult();
            }, 600);
        }

        function showResult() {
            // 隱藏抽卡階段
            document.getElementById('stageDraw').classList.remove('active');
            // 顯示結果階段
            document.getElementById('stageResult').classList.add('active');

            const kin = drawnKin;
            const colorClass = getKinColorClass(kin);
            const sealNumber = getSealNumber(kin);
            const toneNumber = getToneNumber(kin);
            const sealImageNum = sealNumber.toString().padStart(2, '0');

            // 渲染調性符號
            renderToneSymbol(toneNumber);

            // 設定圖騰圖片
            document.getElementById('sealImage').src = `../images/${sealImageNum}.png`;

            // 設定 KIN 與名稱
            const resultKin = document.getElementById('resultKin');
            resultKin.textContent = `KIN ${kin}`;
            resultKin.className = `result-kin ${colorClass}`;

            const resultName = document.getElementById('resultName');
            resultName.textContent = getKinName(kin);
            resultName.className = `result-name ${colorClass}`;

            // 設定訊息
            document.getElementById('messageText').textContent = getMessage(kin);
        }

        function restart() {
            drawnKin = null;
            currentKin = 1;

            // 重置顯示
            document.getElementById('kinDisplay').textContent = 'KIN 1';

            // 切換階段
            document.getElementById('stageResult').classList.remove('active');
            document.getElementById('stageDraw').classList.add('active');

            // 重新開始滾動
            startKinRolling();
        }

        // 頁面載入時開始滾動
        document.addEventListener('DOMContentLoaded', () => {
            startKinRolling();
        });
    </script>
</body>
</html>
