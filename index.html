<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13月亮曆的小共時</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            /* 暖灰亞麻色背景 */
            background: #E8E4DF;
            font-family: 'Noto Serif TC', serif;
            color: #3a3632;
            overflow-x: hidden;
            position: relative;
        }

        /* 細微紋理背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
            z-index: 10;
            padding: 56px 32px 48px;
            max-width: 1100px;
            width: 100%;
        }

        /* HUNAB KU 圖像區 */
        .hunab-ku {
            width: 140px;
            height: 140px;
            position: relative;
        }

        .hunab-ku img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
        }

        /* 標題 - 石碑刻印風格 */
        .header {
            text-align: center;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 0.12em;
            color: #2d2a26;
            margin-bottom: 16px;
            line-height: 1.3;
            /* 內凹刻印效果 */
            text-shadow:
                1px 1px 1px rgba(255, 255, 255, 0.4),
                -1px -1px 1px rgba(0, 0, 0, 0.15);
        }

        .header .subtitle {
            font-size: 16px;
            font-weight: 600;
            color: #6a655c;
            letter-spacing: 0.3em;
            text-shadow:
                1px 1px 0 rgba(255, 255, 255, 0.3);
        }

        /* 石板底襯 - Plate 結構 */
        .plate {
            background: #D5D0C8;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 960px;
            /* 岩石質感邊框 */
            border: 3px solid #c5c0b8;
            box-shadow:
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                inset 0 -2px 4px rgba(0, 0, 0, 0.08),
                0 8px 32px rgba(0, 0, 0, 0.12),
                0 2px 8px rgba(0, 0, 0, 0.08);
            /* 細微紋理 */
            background-image:
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(0,0,0,0.03) 100%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%' height='100%' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-color: #D5D0C8;
            background-blend-mode: overlay, soft-light;
        }

        /* 模式選擇區 - 2x2 象限 */
        .mode-selection {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            width: 100%;
        }

        /* 模式卡片 - 石碑風格 */
        .mode-card {
            border-radius: 16px;
            text-align: center;
            border: none;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            background: #E8E4DF;
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.4),
                0 4px 16px rgba(0, 0, 0, 0.1);
        }

        .mode-card:hover {
            transform: translateY(-4px);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.4),
                0 12px 32px rgba(0, 0, 0, 0.15);
        }

        /* 頂部色塊區域 - 礦石配色 */
        .mode-card-header {
            padding: 28px 24px 22px;
            position: relative;
        }

        .mode-card-header .mode-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            /* 石碑刻印效果 */
            text-shadow:
                1px 1px 1px rgba(255, 255, 255, 0.25),
                -1px -1px 1px rgba(0, 0, 0, 0.2);
        }

        .mode-card-header .mode-keyword {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.15em;
            opacity: 0.9;
        }

        /* 卡片內容區 */
        .mode-card-body {
            padding: 24px 24px 28px;
            background: #f5f3f0;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 2px solid rgba(0, 0, 0, 0.06);
        }

        .mode-card .mode-desc {
            font-size: 16px;
            font-weight: 500;
            color: #4a4540;
            line-height: 1.9;
            margin-bottom: 12px;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
        }

        .mode-card .mode-sub {
            font-size: 13px;
            font-weight: 600;
            color: #8a857a;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }

        /* 按鈕樣式 - 石碑風格 */
        .mode-btn {
            display: inline-block;
            padding: 14px 36px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.12em;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: auto;
            text-shadow:
                1px 1px 1px rgba(255, 255, 255, 0.2),
                -1px -1px 1px rgba(0, 0, 0, 0.15);
            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 3px 8px rgba(0, 0, 0, 0.2);
        }

        /* ========== 紅色 - 快速共時（啟動）========== */
        .mode-card.color-red .mode-card-header {
            background: linear-gradient(135deg, #A84840 0%, #8a3a34 100%);
        }
        .mode-card.color-red .mode-card-header .mode-title,
        .mode-card.color-red .mode-card-header .mode-keyword {
            color: #f5f0eb;
        }
        .mode-card.color-red .mode-btn {
            background: linear-gradient(135deg, #A84840 0%, #8a3a34 100%);
            color: #f5f0eb;
        }
        .mode-card.color-red:hover .mode-btn {
            background: linear-gradient(135deg, #8a3a34 0%, #6a2a24 100%);
        }

        /* ========== 白色 - 共時儀式（精煉）========== */
        .mode-card.color-white .mode-card-header {
            background: linear-gradient(135deg, #8A847A 0%, #6a655c 100%);
        }
        .mode-card.color-white .mode-card-header .mode-title,
        .mode-card.color-white .mode-card-header .mode-keyword {
            color: #f5f3f0;
        }
        .mode-card.color-white .mode-btn {
            background: linear-gradient(135deg, #8A847A 0%, #6a655c 100%);
            color: #f5f3f0;
        }
        .mode-card.color-white:hover .mode-btn {
            background: linear-gradient(135deg, #6a655c 0%, #5a554c 100%);
        }

        /* ========== 藍色 - 時光流轉（蛻變）========== */
        .mode-card.color-blue .mode-card-header {
            background: linear-gradient(135deg, #4A7590 0%, #3a5f78 100%);
        }
        .mode-card.color-blue .mode-card-header .mode-title,
        .mode-card.color-blue .mode-card-header .mode-keyword {
            color: #f0f4f6;
        }
        .mode-card.color-blue .mode-btn {
            background: linear-gradient(135deg, #4A7590 0%, #3a5f78 100%);
            color: #f0f4f6;
        }
        .mode-card.color-blue:hover .mode-btn {
            background: linear-gradient(135deg, #3a5f78 0%, #2a4f68 100%);
        }

        /* ========== 黃色 - 主題指引（智慧的果實）========== */
        .mode-card.color-yellow .mode-card-header {
            background: linear-gradient(135deg, #A89040 0%, #887430 100%);
        }
        .mode-card.color-yellow .mode-card-header .mode-title,
        .mode-card.color-yellow .mode-card-header .mode-keyword {
            color: #faf8f0;
        }
        .mode-card.color-yellow .mode-btn {
            background: linear-gradient(135deg, #A89040 0%, #887430 100%);
            color: #faf8f0;
        }
        .mode-card.color-yellow:hover .mode-btn {
            background: linear-gradient(135deg, #887430 0%, #685420 100%);
        }

        /* 設計者資訊 */
        .designer-credit {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #7a756c;
            line-height: 2;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
        }

        .designer-credit a {
            color: #5a5650;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .designer-credit a:hover {
            color: #3a3632;
        }

        .designer-credit .kin-info {
            font-weight: 700;
            color: #5a5650;
        }

        /* RWD - 手機版卡片堆疊 */
        @media (max-width: 820px) {
            .mode-selection {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .mode-card {
                width: 90%;
                max-width: 420px;
                margin: 0 auto;
            }

            .plate {
                padding: 28px 20px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 36px;
            }
        }

        @media (max-width: 520px) {
            .container {
                gap: 36px;
                padding: 36px 16px 32px;
            }

            .header h1 {
                font-size: 30px;
                letter-spacing: 0.08em;
            }

            .header .subtitle {
                font-size: 13px;
                letter-spacing: 0.2em;
            }

            .hunab-ku {
                width: 110px;
                height: 110px;
            }

            .plate {
                padding: 24px 16px;
            }

            .mode-card-header {
                padding: 22px 20px 18px;
            }

            .mode-card-header .mode-title {
                font-size: 24px;
            }

            .mode-card-header .mode-keyword {
                font-size: 12px;
            }

            .mode-card-body {
                padding: 20px 20px 24px;
            }

            .mode-card .mode-desc {
                font-size: 15px;
            }

            .mode-btn {
                padding: 12px 28px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HUNAB KU 圖像 -->
        <div class="hunab-ku">
            <img src="./images/hunab-ku-1.png" alt="Hunab Ku">
        </div>

        <!-- 標題 -->
        <header class="header">
            <h1>13月亮曆的小共時</h1>
            <p class="subtitle">DREAMSPELL SYNCHRONICITY</p>
        </header>

        <!-- 石板底襯 Plate -->
        <div class="plate">
            <!-- 模式選擇 - 2x2 象限排列 -->
            <div class="mode-selection">
                <!-- 左上：快速共時（紅色 - 啟動） -->
                <a href="./quick/" class="mode-card color-red">
                    <div class="mode-card-header">
                        <h2 class="mode-title">快速共時</h2>
                        <p class="mode-keyword">啟動</p>
                    </div>
                    <div class="mode-card-body">
                        <p class="mode-desc">
                            跟著直覺，<br>
                            快速抽一張今天的訊息。
                        </p>
                        <p class="mode-sub">簡單、直接、不多想</p>
                        <span class="mode-btn">快速抽卡</span>
                    </div>
                </a>

                <!-- 右上：共時儀式（白色 - 精煉） -->
                <a href="./ritual/" class="mode-card color-white">
                    <div class="mode-card-header">
                        <h2 class="mode-title">共時儀式</h2>
                        <p class="mode-keyword">精煉</p>
                    </div>
                    <div class="mode-card-body">
                        <p class="mode-desc">
                            給自己一點時間，<br>
                            讓訊息慢慢落到身體。
                        </p>
                        <p class="mode-sub">約 1–3 分鐘的靜心體驗</p>
                        <span class="mode-btn">進入儀式</span>
                    </div>
                </a>

                <!-- 左下：時光流轉（藍色 - 蛻變） -->
                <a href="./three-cards/" class="mode-card color-blue">
                    <div class="mode-card-header">
                        <h2 class="mode-title">時光流轉</h2>
                        <p class="mode-keyword">蛻變</p>
                    </div>
                    <div class="mode-card-body">
                        <p class="mode-desc">
                            過去、現在、未來，<br>
                            三個印記交織成完整訊息。
                        </p>
                        <p class="mode-sub">三印記能量合盤</p>
                        <span class="mode-btn">抽三張牌</span>
                    </div>
                </a>

                <!-- 右下：主題指引（黃色 - 智慧的果實） -->
                <a href="./theme-guidance/" class="mode-card color-yellow">
                    <div class="mode-card-header">
                        <h2 class="mode-title">主題指引</h2>
                        <p class="mode-keyword">智慧的果實</p>
                    </div>
                    <div class="mode-card-body">
                        <p class="mode-desc">
                            選擇一個主題，<br>
                            獲取專屬的印記指引。
                        </p>
                        <p class="mode-sub">財務・事業・感情・健康・成長</p>
                        <span class="mode-btn">選擇主題</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- 設計者資訊 -->
        <footer class="designer-credit">
            設計 | <span class="kin-info">KIN 74 太陽的白巫師</span>
            <a href="https://www.facebook.com/hiper.wu" target="_blank">HIPER</a><br>
            <a href="https://www.facebook.com/profile.php?id=100074630472925" target="_blank">波波的日常數數</a>
        </footer>
    </div>
</body>
</html>
