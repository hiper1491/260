<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13月亮曆的小共時</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            /* 身心靈配色：溫暖大地色調，非米白 */
            background: linear-gradient(
                165deg,
                #e8e4df 0%,
                #ddd8d2 25%,
                #d5d0c8 50%,
                #ddd8d2 75%,
                #e8e4df 100%
            );
            font-family: 'Noto Serif TC', serif;
            color: #3a3632;
            overflow-x: hidden;
            position: relative;
        }

        /* 柔和光暈背景 - 溫暖自然 */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(
                circle,
                rgba(180, 165, 145, 0.15) 0%,
                transparent 60%
            );
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -15%;
            left: -10%;
            width: 45%;
            height: 45%;
            background: radial-gradient(
                circle,
                rgba(160, 170, 155, 0.12) 0%,
                transparent 60%
            );
            pointer-events: none;
            z-index: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 10;
            padding: 48px 32px 40px;
            max-width: 1100px;
            width: 100%;
        }

        /* HUNAB KU 圖像區 */
        .hunab-ku {
            width: 160px;
            height: 160px;
            position: relative;
        }

        .hunab-ku img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        /* 標題 */
        .header {
            text-align: center;
            margin-top: -8px;
        }

        .header h1 {
            font-size: 44px;
            font-weight: 900;
            letter-spacing: 0.08em;
            color: #2d2a26;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .header .subtitle {
            font-size: 16px;
            font-weight: 600;
            color: #6a655c;
            letter-spacing: 0.25em;
        }

        /* 模式選擇區 - 2x2 象限 */
        .mode-selection {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            width: 100%;
            max-width: 920px;
        }

        /* 模式卡片 */
        .mode-card {
            border-radius: 16px;
            text-align: center;
            border: none;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
        }

        .mode-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
        }

        /* 頂部色塊區域 - 明確顏色標識 */
        .mode-card-header {
            padding: 28px 24px 20px;
            position: relative;
        }

        .mode-card-header .mode-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .mode-card-header .mode-keyword {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            letter-spacing: 0.1em;
        }

        /* 卡片內容區 */
        .mode-card-body {
            padding: 24px 24px 28px;
            background: #fff;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mode-card .mode-desc {
            font-size: 16px;
            font-weight: 500;
            color: #4a4540;
            line-height: 1.9;
            margin-bottom: 12px;
        }

        .mode-card .mode-sub {
            font-size: 14px;
            font-weight: 500;
            color: #7a756c;
            margin-bottom: 20px;
        }

        /* 按鈕樣式 */
        .mode-btn {
            display: inline-block;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.1em;
            border-radius: 28px;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        /* ========== 紅色 - 快速共時（啟動） ========== */
        .mode-card.color-red .mode-card-header {
            background: linear-gradient(135deg, #c45a52 0%, #a84840 100%);
        }
        .mode-card.color-red .mode-btn {
            background: #c45a52;
            color: #fff;
        }
        .mode-card.color-red:hover .mode-btn {
            background: #a84840;
        }

        /* ========== 白色 - 共時儀式（精煉） ========== */
        .mode-card.color-white .mode-card-header {
            background: linear-gradient(135deg, #a8a298 0%, #8a847a 100%);
        }
        .mode-card.color-white .mode-card-header .mode-title,
        .mode-card.color-white .mode-card-header .mode-keyword {
            color: #fff;
        }
        .mode-card.color-white .mode-btn {
            background: #8a847a;
            color: #fff;
        }
        .mode-card.color-white:hover .mode-btn {
            background: #6a655c;
        }

        /* ========== 藍色 - 時光流轉（蛻變） ========== */
        .mode-card.color-blue .mode-card-header {
            background: linear-gradient(135deg, #5a8fa8 0%, #4a7590 100%);
        }
        .mode-card.color-blue .mode-btn {
            background: #5a8fa8;
            color: #fff;
        }
        .mode-card.color-blue:hover .mode-btn {
            background: #4a7590;
        }

        /* ========== 黃色 - 主題指引（智慧的果實） ========== */
        .mode-card.color-yellow .mode-card-header {
            background: linear-gradient(135deg, #c4a855 0%, #a89040 100%);
        }
        .mode-card.color-yellow .mode-btn {
            background: #c4a855;
            color: #fff;
        }
        .mode-card.color-yellow:hover .mode-btn {
            background: #a89040;
        }

        /* 設計者資訊 */
        .designer-credit {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: #7a756c;
            line-height: 2;
        }

        .designer-credit a {
            color: #5a5650;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .designer-credit a:hover {
            color: #3a3632;
        }

        .designer-credit .kin-info {
            font-weight: 600;
            color: #5a5650;
        }

        /* RWD */
        @media (max-width: 820px) {
            .mode-selection {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .mode-card {
                max-width: 480px;
                width: 100%;
                margin: 0 auto;
            }

            .header h1 {
                font-size: 36px;
            }
        }

        @media (max-width: 520px) {
            .container {
                gap: 28px;
                padding: 28px 16px 24px;
            }

            .header h1 {
                font-size: 28px;
            }

            .header .subtitle {
                font-size: 13px;
            }

            .hunab-ku {
                width: 120px;
                height: 120px;
            }

            .mode-card-header {
                padding: 22px 20px 16px;
            }

            .mode-card-header .mode-title {
                font-size: 24px;
            }

            .mode-card-header .mode-keyword {
                font-size: 13px;
            }

            .mode-card-body {
                padding: 20px 20px 24px;
            }

            .mode-card .mode-desc {
                font-size: 15px;
            }

            .mode-btn {
                padding: 12px 28px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HUNAB KU 圖像 -->
        <div class="hunab-ku">
            <img src="./images/hunab-ku-1.png" alt="Hunab Ku">
        </div>

        <!-- 標題 -->
        <header class="header">
            <h1>13月亮曆的小共時</h1>
            <p class="subtitle">Dreamspell Synchronicity</p>
        </header>

        <!-- 模式選擇 - 2x2 象限排列 -->
        <div class="mode-selection">
            <!-- 左上：快速共時（紅色 - 啟動） -->
            <a href="./quick/" class="mode-card color-red">
                <div class="mode-card-header">
                    <h2 class="mode-title">快速共時</h2>
                    <p class="mode-keyword">（啟動）</p>
                </div>
                <div class="mode-card-body">
                    <p class="mode-desc">
                        跟著直覺，<br>
                        快速抽一張今天的訊息。
                    </p>
                    <p class="mode-sub">簡單、直接、不多想</p>
                    <span class="mode-btn">快速抽卡</span>
                </div>
            </a>

            <!-- 右上：共時儀式（白色 - 精煉） -->
            <a href="./ritual/" class="mode-card color-white">
                <div class="mode-card-header">
                    <h2 class="mode-title">共時儀式</h2>
                    <p class="mode-keyword">（精煉）</p>
                </div>
                <div class="mode-card-body">
                    <p class="mode-desc">
                        給自己一點時間，<br>
                        讓訊息慢慢落到身體。
                    </p>
                    <p class="mode-sub">約 1–3 分鐘的靜心體驗</p>
                    <span class="mode-btn">進入儀式</span>
                </div>
            </a>

            <!-- 左下：時光流轉（藍色 - 蛻變） -->
            <a href="./three-cards/" class="mode-card color-blue">
                <div class="mode-card-header">
                    <h2 class="mode-title">時光流轉</h2>
                    <p class="mode-keyword">（蛻變）</p>
                </div>
                <div class="mode-card-body">
                    <p class="mode-desc">
                        過去、現在、未來，<br>
                        三個印記交織成完整訊息。
                    </p>
                    <p class="mode-sub">三印記能量合盤</p>
                    <span class="mode-btn">抽三張牌</span>
                </div>
            </a>

            <!-- 右下：主題指引（黃色 - 智慧的果實） -->
            <a href="./theme-guidance/" class="mode-card color-yellow">
                <div class="mode-card-header">
                    <h2 class="mode-title">主題指引</h2>
                    <p class="mode-keyword">（智慧的果實）</p>
                </div>
                <div class="mode-card-body">
                    <p class="mode-desc">
                        選擇一個主題，<br>
                        獲取專屬的印記指引。
                    </p>
                    <p class="mode-sub">財務・事業・感情・健康・成長</p>
                    <span class="mode-btn">選擇主題</span>
                </div>
            </a>
        </div>

        <!-- 設計者資訊 -->
        <footer class="designer-credit">
            設計 | <span class="kin-info">KIN 74 太陽的白巫師</span>
            <a href="https://www.facebook.com/hiper.wu" target="_blank">HIPER</a><br>
            <a href="https://www.facebook.com/profile.php?id=100074630472925" target="_blank">波波的日常數數</a>
        </footer>
    </div>
</body>
</html>
