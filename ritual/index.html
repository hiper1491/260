<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共時儀式 | 13月亮曆的小共時</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(
                165deg,
                #1a1a2e 0%,
                #16213e 50%,
                #1a1a2e 100%
            );
            font-family: 'Noto Serif TC', serif;
            color: #e8e4dc;
            overflow-x: hidden;
            position: relative;
        }

        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 160px 120px, rgba(255,255,255,0.3), transparent);
            background-size: 200px 200px;
            animation: twinkle 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* 返回連結 */
        .back-link {
            position: fixed;
            top: 24px;
            left: 24px;
            font-size: 14px;
            color: rgba(255, 215, 0, 0.5);
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            color: rgba(255, 215, 0, 0.8);
        }

        .back-link::before {
            content: '←';
            margin-right: 8px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 40px 24px;
            max-width: 600px;
            width: 100%;
            min-height: 100vh;
        }

        /* 階段容器 */
        .stage {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        .stage.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 開始階段 */
        .stage-start h1 {
            font-size: 32px;
            font-weight: 300;
            color: rgba(255, 215, 0, 0.9);
            margin-bottom: 24px;
            letter-spacing: 0.1em;
        }

        .stage-start p {
            font-size: 16px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            line-height: 2;
            margin-bottom: 40px;
        }

        .start-btn {
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 400;
            font-family: 'Noto Serif TC', serif;
            color: #1a1a2e;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.9), rgba(255, 180, 0, 0.9));
            border: none;
            border-radius: 32px;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.4);
        }

        /* 呼吸階段 */
        .stage-breathe h2 {
            font-size: 24px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 48px;
            letter-spacing: 0.15em;
        }

        .breath-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2) 0%, transparent 70%);
            border: 2px solid rgba(255, 215, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
        }

        .breath-circle.inhale {
            animation: breatheIn 4s ease-in-out forwards;
        }

        .breath-circle.exhale {
            animation: breatheOut 4s ease-in-out forwards;
        }

        @keyframes breatheIn {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 1; }
        }

        @keyframes breatheOut {
            from { transform: scale(1.2); opacity: 1; }
            to { transform: scale(0.8); opacity: 0.5; }
        }

        .breath-text {
            font-size: 18px;
            color: rgba(255, 215, 0, 0.8);
            letter-spacing: 0.2em;
        }

        .breath-count {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 24px;
        }

        /* 抽取階段 */
        .stage-draw h2 {
            font-size: 20px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            letter-spacing: 0.1em;
        }

        .draw-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 70%);
            border: 2px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s ease;
            position: relative;
        }

        .draw-circle:hover {
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.2);
        }

        .draw-circle::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(255, 215, 0, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        .draw-text {
            font-size: 16px;
            color: rgba(255, 215, 0, 0.8);
            letter-spacing: 0.15em;
        }

        /* 揭示階段 */
        .stage-reveal {
            gap: 24px;
        }

        .seal-image {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: contain;
            animation: revealSeal 1.5s ease forwards;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        @keyframes revealSeal {
            0% { opacity: 0; transform: scale(0.3) rotate(-180deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .kin-number {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 0.1em;
            animation: fadeIn 1s ease 0.3s both;
        }

        .kin-number.kin-red { color: #ff6b6b; text-shadow: 0 0 30px rgba(255, 107, 107, 0.5); }
        .kin-number.kin-white { color: #ffffff; text-shadow: 0 0 30px rgba(255, 255, 255, 0.5); }
        .kin-number.kin-blue { color: #5cb8ff; text-shadow: 0 0 30px rgba(92, 184, 255, 0.5); }
        .kin-number.kin-yellow { color: #ffd700; text-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }

        .kin-name {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.15em;
            animation: fadeIn 1s ease 0.5s both;
        }

        .kin-name.kin-red { color: #ff6b6b; }
        .kin-name.kin-white { color: #ffffff; }
        .kin-name.kin-blue { color: #5cb8ff; }
        .kin-name.kin-yellow { color: #ffd700; }

        .message-box {
            max-width: 480px;
            padding: 28px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease 0.8s both;
        }

        .message-box h3 {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 215, 0, 0.7);
            margin-bottom: 14px;
            letter-spacing: 0.2em;
        }

        .message-text {
            font-size: 17px;
            font-weight: 300;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.9);
        }

        .body-connection {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 1s ease 1.2s both;
        }

        .body-connection h4 {
            font-size: 12px;
            font-weight: 400;
            color: rgba(255, 215, 0, 0.6);
            margin-bottom: 10px;
            letter-spacing: 0.15em;
        }

        .body-part {
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 215, 0, 0.9);
            margin-bottom: 8px;
        }

        .body-invitation {
            font-size: 14px;
            font-weight: 300;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
        }

        .restart-btn {
            margin-top: 32px;
            padding: 14px 36px;
            font-size: 14px;
            font-weight: 400;
            font-family: 'Noto Serif TC', serif;
            color: rgba(255, 215, 0, 0.8);
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 28px;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            animation: fadeIn 1s ease 1.5s both;
        }

        .restart-btn:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.5);
        }

        /* RWD */
        @media (max-width: 520px) {
            .stage-start h1 {
                font-size: 26px;
            }

            .breath-circle,
            .draw-circle {
                width: 150px;
                height: 150px;
            }

            .seal-image {
                width: 100px;
                height: 100px;
            }

            .kin-number {
                font-size: 32px;
            }

            .kin-name {
                font-size: 18px;
            }

            .message-box {
                padding: 20px;
            }

            .message-text {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">返回</a>

    <div class="container">
        <!-- 階段 1：開始 -->
        <div class="stage stage-start active" id="stageStart">
            <h1>共時儀式</h1>
            <p>
                給自己一點時間，<br>
                讓訊息慢慢落到身體。<br><br>
                準備好了，就開始吧。

            <button class="start-btn" onclick="startRitual()">開始儀式</button>
        </div>

        <!-- 階段 2：呼吸 -->
        <div class="stage stage-breathe" id="stageBreathe">
            <h2>跟著呼吸</h2>
            <div class="breath-circle" id="breathCircle">
                <span class="breath-text" id="breathText">吸氣</span>
            </div>
            <p class="breath-count" id="breathCount">1 / 3</p>
        </div>

        <!-- 階段 3：抽取 -->
        <div class="stage stage-draw" id="stageDraw">
            <h2>當你準備好了</h2>
            <div class="draw-circle" onclick="drawKin()">
                <span class="draw-text">輕觸抽取</span>
            </div>
        </div>

        <!-- 階段 4：揭示 -->
        <div class="stage stage-reveal" id="stageReveal">
            <img class="seal-image" id="sealImage" src="" alt="圖騰">
            <div class="kin-number" id="kinNumber"></div>
            <div class="kin-name" id="kinName"></div>
            <div class="message-box">
                <h3>✦ 共時訊息 ✦</h3>
                <p class="message-text" id="messageText"></p>
                <div class="body-connection">
                    <h4>✦ 身體連結 ✦</h4>
                    <p class="body-part" id="bodyPart"></p>
                    <p class="body-invitation" id="bodyInvitation"></p>
                </div>
            </div>
            <button class="restart-btn" onclick="restart()">再來一次</button>
        </div>
    </div>

        // 13 調性名稱
        const toneNames = ["磁性的", "月亮的", "電力的", "自我存在的", "超頻的", "韻律的", "共振的", "銀河的", "太陽的", "行星的", "光譜的", "水晶的", "宇宙的"];

        // 20 圖騰名稱
        const sealNames = ["紅龍", "白風", "藍夜", "黃種子", "紅蛇", "白世界橋", "藍手", "黃星星", "紅月", "白狗", "藍猴", "黃人", "紅天行者", "白巫師", "藍鷹", "黃戰士", "紅地球", "白鏡", "藍風暴", "黃太陽"];

        let breathCount = 0;
        const maxBreaths = 3;

        function switchStage(currentId, nextId) {
            document.getElementById(currentId).classList.remove('active');
            setTimeout(() => {
                document.getElementById(nextId).classList.add('active');
            }, 300);
        }

        function startRitual() {
            switchStage('stageStart', 'stageBreathe');
            startBreathing();
        }

        function startBreathing() {
            breathCount = 0;
            breathCycle();
        }

        function breathCycle() {
            if (breathCount >= maxBreaths) {
                setTimeout(() => {
                    switchStage('stageBreathe', 'stageDraw');
                }, 1000);
                return;
            }

            const circle = document.getElementById('breathCircle');
            const text = document.getElementById('breathText');
            const count = document.getElementById('breathCount');

            circle.className = 'breath-circle inhale';
            text.textContent = '吸氣';
            count.textContent = `${breathCount + 1} / ${maxBreaths}`;

            setTimeout(() => {
                circle.className = 'breath-circle exhale';
                text.textContent = '吐氣';

                setTimeout(() => {
                    breathCount++;
                    breathCycle();
                }, 4000);
            }, 4000);
        }

        function getKinColorClass(kinNumber) {
            const remainder = kinNumber % 4;
            if (remainder === 1) return 'kin-red';
            if (remainder === 2) return 'kin-white';
            if (remainder === 3) return 'kin-blue';
            return 'kin-yellow';
        }

        function getSealNumber(kinNumber) {
            return ((kinNumber - 1) % 20) + 1;
        }

        function getToneNumber(kinNumber) {
            return ((kinNumber - 1) % 13) + 1;
        }

        function getKinName(kinNumber) {
            const toneIndex = getToneNumber(kinNumber) - 1;
            const sealIndex = getSealNumber(kinNumber) - 1;
            return toneNames[toneIndex] + sealNames[sealIndex];
        }

        function drawKin() {
            const kinNumber = Math.floor(Math.random() * 260) + 1;
            const sealNumber = getSealNumber(kinNumber);
            const colorClass = getKinColorClass(kinNumber);
            const sealInfo = sealBodyParts[sealNumber];

            // 設定圖騰圖片
            const sealImageNum = sealNumber.toString().padStart(2, '0');
            document.getElementById('sealImage').src = `../images/${sealImageNum}.png`;

            // 設定 KIN 資訊
            document.getElementById('kinNumber').textContent = `KIN ${kinNumber}`;
            document.getElementById('kinNumber').className = `kin-number ${colorClass}`;
            document.getElementById('kinName').textContent = getKinName(kinNumber);
            document.getElementById('kinName').className = `kin-name ${colorClass}`;
            document.getElementById('messageText').textContent = kinMessages[kinNumber];

            // 設定身體連結
            document.getElementById('bodyPart').textContent = `${sealInfo.name}｜${sealInfo.part}`;
            document.getElementById('bodyInvitation').textContent = sealInfo.invitation;

            switchStage('stageDraw', 'stageReveal');
        }

        function restart() {
            document.getElementById('stageReveal').classList.remove('active');
            setTimeout(() => {
                document.getElementById('stageStart').classList.add('active');
            }, 300);
        }
    </script>
