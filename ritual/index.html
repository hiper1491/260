<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共時儀式 | 13月亮曆的小共時</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* 身心靈配色：溫暖大地色調 */
            background: linear-gradient(
                165deg,
                #e8e4df 0%,
                #ddd8d2 25%,
                #d5d0c8 50%,
                #ddd8d2 75%,
                #e8e4df 100%
            );
            font-family: 'Noto Serif TC', serif;
            color: #3a3632;
            overflow-x: hidden;
            position: relative;
        }

        /* 柔和光暈背景 */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(
                circle,
                rgba(168, 162, 152, 0.1) 0%,
                transparent 60%
            );
            pointer-events: none;
            z-index: 0;
        }

        /* 返回連結 */
        .back-link {
            position: fixed;
            top: 24px;
            left: 24px;
            font-size: 15px;
            font-weight: 600;
            color: #7a756c;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: color 0.3s ease;
            z-index: 100;
        }

        .back-link:hover {
            color: #4a4540;
        }

        .back-link::before {
            content: '←';
            margin-right: 8px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            padding: 40px 24px;
            max-width: 600px;
            width: 100%;
            min-height: 100vh;
        }

        /* 階段容器 */
        .stage {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 1s ease;
            width: 100%;
        }

        .stage.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* ==================== State 1：當天印記校準 ==================== */
        .stage-calibrate {
            gap: 32px;
        }

        .calibrate-title {
            font-size: 14px;
            font-weight: 300;
            color: #a09a8a;
            letter-spacing: 0.2em;
        }

        .calibrate-date {
            font-size: 16px;
            font-weight: 300;
            color: #6a665c;
            letter-spacing: 0.1em;
        }

        .calibrate-seal {
            width: 140px;
            height: 140px;
            border-radius: 12px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(180, 175, 160, 0.3));
            animation: sealGlow 3s ease-in-out infinite;
        }

        @keyframes sealGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(180, 175, 160, 0.3)); }
            50% { filter: drop-shadow(0 0 30px rgba(180, 175, 160, 0.5)); }
        }

        .calibrate-kin {
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .calibrate-kin.kin-red { color: #c4706a; }
        .calibrate-kin.kin-white { color: #6a665c; }
        .calibrate-kin.kin-blue { color: #6a8fa0; }
        .calibrate-kin.kin-yellow { color: #b8a860; }

        .calibrate-name {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.15em;
        }

        .calibrate-name.kin-red { color: #c4706a; }
        .calibrate-name.kin-white { color: #6a665c; }
        .calibrate-name.kin-blue { color: #6a8fa0; }
        .calibrate-name.kin-yellow { color: #b8a860; }

        .calibrate-hint {
            font-size: 13px;
            font-weight: 300;
            color: #a09a8a;
            margin-top: 40px;
            letter-spacing: 0.1em;
        }

        /* ==================== State 2：呼吸過渡 ==================== */
        .stage-breathe {
            gap: 32px;
        }

        .breath-count {
            font-size: 18px;
            font-weight: 400;
            color: #6a665c;
            letter-spacing: 0.15em;
        }

        .breath-hint {
            font-size: 14px;
            font-weight: 300;
            color: #a09a8a;
            letter-spacing: 0.1em;
        }

        .breath-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 175, 160, 0.1) 0%, transparent 70%);
            border: 2px solid rgba(160, 154, 138, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .breath-circle.inhale {
            animation: breatheIn 4s ease-in-out forwards;
        }

        .breath-circle.exhale {
            animation: breatheOut 4s ease-in-out forwards;
        }

        @keyframes breatheIn {
            from { transform: scale(0.7); opacity: 0.4; border-color: rgba(160, 154, 138, 0.2); }
            to { transform: scale(1.1); opacity: 1; border-color: rgba(160, 154, 138, 0.6); }
        }

        @keyframes breatheOut {
            from { transform: scale(1.1); opacity: 1; border-color: rgba(160, 154, 138, 0.6); }
            to { transform: scale(0.7); opacity: 0.4; border-color: rgba(160, 154, 138, 0.2); }
        }

        .breath-text {
            font-size: 20px;
            color: #8a857a;
            letter-spacing: 0.25em;
        }

        /* ==================== State 3：抽卡儀式 ==================== */
        .stage-draw {
            gap: 30px;
        }

        /* 260 左爾金曆：20行（圖騰）× 13列（調性） */
        .tzolkin-display {
            width: 100%;
            max-width: 360px;
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 2px;
            padding: 12px;
            background: rgba(160, 154, 138, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(160, 154, 138, 0.2);
        }

        .tzolkin-cell {
            aspect-ratio: 1;
            border-radius: 2px;
            background: rgba(106, 102, 92, 0.12);
            transition: all 0.1s ease;
            min-width: 8px;
            min-height: 8px;
        }

        .tzolkin-cell.highlight {
            background: rgba(184, 168, 96, 0.6);
            transform: scale(1.3);
            z-index: 1;
        }

        .tzolkin-cell.red { background: rgba(196, 112, 106, 0.8); }
        .tzolkin-cell.white { background: rgba(200, 195, 185, 0.9); }
        .tzolkin-cell.blue { background: rgba(106, 143, 160, 0.8); }
        .tzolkin-cell.yellow { background: rgba(184, 168, 96, 0.8); }

        @keyframes tzolkinPulse {
            0%, 100% { transform: scale(1.3); box-shadow: 0 0 10px currentColor; }
            50% { transform: scale(1.6); box-shadow: 0 0 20px currentColor; }
        }

        .draw-kin-display {
            font-size: 56px;
            font-weight: 300;
            color: #6a665c;
            letter-spacing: 0.05em;
            min-width: 180px;
            text-align: center;
        }

        .draw-kin-display.rolling {
            animation: kinPulse 0.15s ease infinite;
        }

        @keyframes kinPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .draw-btn {
            padding: 20px 48px;
            font-size: 18px;
            font-weight: 500;
            font-family: 'Noto Serif TC', serif;
            color: #fff;
            background: linear-gradient(135deg, #8a857a 0%, #6a665c 100%);
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.15em;
            box-shadow: 0 4px 20px rgba(106, 102, 92, 0.3);
            position: relative;
            overflow: hidden;
        }

        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 28px rgba(106, 102, 92, 0.4);
            background: linear-gradient(135deg, #9a958a 0%, #7a756a 100%);
        }

        .draw-btn:active {
            transform: translateY(0);
        }

        .draw-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, transparent 60%);
            animation: btnPulse 2s ease-in-out infinite;
        }

        @keyframes btnPulse {
            0%, 100% { opacity: 0.5; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }

        .draw-hint {
            font-size: 13px;
            font-weight: 300;
            color: #a09a8a;
            letter-spacing: 0.1em;
        }

        /* ==================== State 4：印記顯現 ==================== */
        .stage-reveal {
            justify-content: center;
        }

        .reveal-seal {
            width: 280px;
            height: 280px;
            border-radius: 16px;
            object-fit: contain;
            animation: revealSeal 2s ease forwards;
            filter: drop-shadow(0 0 30px rgba(180, 175, 160, 0.4));
        }

        @keyframes revealSeal {
            0% { opacity: 0; transform: scale(0.2) rotate(-180deg); filter: drop-shadow(0 0 0 transparent); }
            60% { opacity: 1; transform: scale(1.1) rotate(10deg); filter: drop-shadow(0 0 40px rgba(180, 175, 160, 0.5)); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); filter: drop-shadow(0 0 30px rgba(180, 175, 160, 0.4)); }
        }

        /* ==================== State 5：波符位置 ==================== */
        .stage-wavespell {
            gap: 32px;
        }

        .wavespell-kin {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        .wavespell-kin.kin-red { color: #c4706a; }
        .wavespell-kin.kin-white { color: #6a665c; }
        .wavespell-kin.kin-blue { color: #6a8fa0; }
        .wavespell-kin.kin-yellow { color: #b8a860; }

        .wavespell-name {
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-top: -8px;
        }

        .wavespell-name.kin-red { color: #c4706a; }
        .wavespell-name.kin-white { color: #6a665c; }
        .wavespell-name.kin-blue { color: #6a8fa0; }
        .wavespell-name.kin-yellow { color: #b8a860; }

        .wavespell-seal {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(180, 175, 160, 0.3));
        }

        .wavespell-info-box {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 28px 36px;
            max-width: 360px;
        }

        .wavespell-label {
            font-size: 12px;
            font-weight: 300;
            color: #a09a8a;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        .wavespell-value {
            font-size: 18px;
            font-weight: 400;
            color: #4a4540;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        .wavespell-position-label {
            font-size: 12px;
            font-weight: 300;
            color: #a09a8a;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        .wavespell-position {
            font-size: 28px;
            font-weight: 300;
            color: #6a665c;
            letter-spacing: 0.05em;
        }

        /* 波符視覺化 */
        .wavespell-visual {
            display: flex;
            gap: 6px;
            margin-top: 16px;
            justify-content: center;
        }

        .wavespell-day {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            background: rgba(160, 154, 138, 0.2);
        }

        .wavespell-day.current {
            background: #c4b89a;
        }

        .wavespell-day.kin-red.current { background: #c4706a; }
        .wavespell-day.kin-white.current { background: #a09a8a; }
        .wavespell-day.kin-blue.current { background: #6a8fa0; }
        .wavespell-day.kin-yellow.current { background: #b8a860; }

        /* 共時訊息區塊 */
        .wavespell-message-box {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            padding: 20px 28px;
            max-width: 380px;
            margin-bottom: 16px;
        }

        .wavespell-message-label {
            font-size: 12px;
            font-weight: 300;
            color: #a09a8a;
            letter-spacing: 0.15em;
            margin-bottom: 12px;
        }

        .wavespell-message {
            font-size: 16px;
            font-weight: 400;
            color: #4a4540;
            line-height: 1.8;
        }

        /* 身體連結區塊 */
        .wavespell-body-box {
            background: #fff;
            border-radius: 14px;
            border: 2px solid rgba(160, 150, 135, 0.3);
            padding: 20px 28px;
            max-width: 420px;
            margin-bottom: 24px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        }

        .wavespell-body-label {
            font-size: 13px;
            font-weight: 600;
            color: #7a756c;
            letter-spacing: 0.15em;
            margin-bottom: 10px;
        }

        .wavespell-body-part {
            font-size: 18px;
            font-weight: 700;
            color: #3a3632;
            margin-bottom: 12px;
        }

        .wavespell-body-invitation {
            font-size: 15px;
            font-weight: 500;
            color: #4a4540;
            line-height: 1.8;
        }

        .restart-btn {
            margin-top: 40px;
            padding: 14px 36px;
            font-size: 14px;
            font-weight: 400;
            font-family: 'Noto Serif TC', serif;
            color: #8a857a;
            background: transparent;
            border: 1px solid rgba(138, 133, 122, 0.4);
            border-radius: 28px;
            cursor: pointer;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        .restart-btn:hover {
            background: rgba(138, 133, 122, 0.05);
            border-color: rgba(138, 133, 122, 0.6);
        }

        /* RWD */
        @media (max-width: 520px) {
            .calibrate-seal {
                width: 120px;
                height: 120px;
            }

            .calibrate-kin {
                font-size: 28px;
            }

            .calibrate-name {
                font-size: 18px;
            }

            .breath-circle {
                width: 160px;
                height: 160px;
            }

            .tzolkin-display {
                max-width: 300px;
                padding: 10px;
                gap: 1px;
            }

            .tzolkin-cell {
                min-width: 6px;
                min-height: 6px;
            }

            .draw-kin-display {
                font-size: 40px;
            }

            .draw-btn {
                padding: 16px 40px;
                font-size: 16px;
            }

            .reveal-seal {
                width: 220px;
                height: 220px;
            }

            .wavespell-kin {
                font-size: 26px;
            }

            .wavespell-name {
                font-size: 17px;
            }

            .wavespell-seal {
                width: 80px;
                height: 80px;
            }

            .wavespell-info-box {
                padding: 20px 24px;
            }

            .wavespell-day {
                width: 14px;
                height: 14px;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">返回</a>

    <div class="container">
        <!-- State 1：當天印記校準 -->
        <div class="stage stage-calibrate active" id="stageCalibrate">
            <p class="calibrate-title">今日印記</p>
            <p class="calibrate-date" id="calibrateDate"></p>
            <img class="calibrate-seal" id="calibrateSeal" src="" alt="今日圖騰">
            <div class="calibrate-kin" id="calibrateKin"></div>
            <div class="calibrate-name" id="calibrateName"></div>
            <p class="calibrate-hint">正在校準能量頻率...</p>
        </div>

        <!-- State 2：呼吸過渡 -->
        <div class="stage stage-breathe" id="stageBreathe">
            <p class="breath-count" id="breathCount">第一次呼吸</p>
            <div class="breath-circle" id="breathCircle">
                <span class="breath-text" id="breathText">吸氣</span>
            </div>
            <p class="breath-hint">放鬆身心，準備接收訊息</p>
        </div>

        <!-- State 3：抽卡儀式 -->
        <div class="stage stage-draw" id="stageDraw">
            <div class="tzolkin-display" id="tzolkinDisplay"></div>
            <div class="draw-kin-display rolling" id="drawKinDisplay">KIN 1</div>
            <button class="draw-btn" id="drawBtn" onclick="stopDraw()">抽取印記</button>
            <p class="draw-hint">準備好時，點擊按鈕停止</p>
        </div>

        <!-- State 4：印記顯現 -->
        <div class="stage stage-reveal" id="stageReveal">
            <img class="reveal-seal" id="revealSeal" src="" alt="你的圖騰">
        </div>

        <!-- State 5：波符位置 -->
        <div class="stage stage-wavespell" id="stageWavespell">
            <img class="wavespell-seal" id="wavespellSeal" src="" alt="圖騰">
            <div class="wavespell-kin" id="wavespellKin"></div>
            <div class="wavespell-name" id="wavespellName"></div>

            <!-- 共時訊息 -->
            <div class="wavespell-message-box" id="wavespellMessageBox">
                <p class="wavespell-message-label">共時訊息</p>
                <p class="wavespell-message" id="wavespellMessage"></p>
            </div>

            <!-- 身體連結 -->
            <div class="wavespell-body-box" id="wavespellBodyBox">
                <p class="wavespell-body-label">身體連結</p>
                <p class="wavespell-body-part" id="wavespellBodyPart"></p>
                <p class="wavespell-body-invitation" id="wavespellBodyInvitation"></p>
            </div>

            <div class="wavespell-info-box">
                <p class="wavespell-label">所屬波符</p>
                <p class="wavespell-value" id="wavespellValue"></p>
                <p class="wavespell-position-label">波符中的位置</p>
                <p class="wavespell-position" id="wavespellPosition"></p>
                <div class="wavespell-visual" id="wavespellVisual"></div>
            </div>
            <button class="restart-btn" onclick="restart()">再來一次</button>
        </div>
    </div>

    <!-- 背景音樂 placeholder -->
    <audio id="bgMusic" loop>
        <!-- 未來可加入實際音檔 -->
    </audio>

    <script>
        // ==================== 資料定義 ====================

        // 13 調性名稱
        const toneNames = ["磁性的", "月亮的", "電力的", "自我存在的", "超頻的", "韻律的", "共振的", "銀河的", "太陽的", "行星的", "光譜的", "水晶的", "宇宙的"];

        // 20 圖騰名稱
        const sealNames = ["紅龍", "白風", "藍夜", "黃種子", "紅蛇", "白世界橋", "藍手", "黃星星", "紅月", "白狗", "藍猴", "黃人", "紅天行者", "白巫師", "藍鷹", "黃戰士", "紅地球", "白鏡", "藍風暴", "黃太陽"];

        ];

        // 波符起始 KIN（每個波符的第 1 天）
        const wavespellStartKins = [1, 14, 27, 40, 53, 66, 79, 92, 105, 118, 131, 144, 157, 170, 183, 196, 209, 222, 235, 248];

        // 20 個圖騰的身體連結資料
        const sealBodyParts = {

        // 簡化的共時訊息（依據圖騰）
        const sealMessages = {
            1: "有意識的聚焦創造，新事物將從你手中誕生並得到滋養。",

            20: "讓你的光芒由內而外散發，點亮周圍的一切。"
        };

        // ==================== 工具函數 ====================

        function getKinColorClass(kinNumber) {
            const remainder = kinNumber % 4;
            if (remainder === 1) return 'kin-red';
            if (remainder === 2) return 'kin-white';
            if (remainder === 3) return 'kin-blue';
            return 'kin-yellow';
        }

        function getSealNumber(kinNumber) {
            return ((kinNumber - 1) % 20) + 1;
        }

        function getToneNumber(kinNumber) {
            return ((kinNumber - 1) % 13) + 1;
        }

        function getKinName(kinNumber) {
            const toneIndex = getToneNumber(kinNumber) - 1;
            const sealIndex = getSealNumber(kinNumber) - 1;
            return toneNames[toneIndex] + sealNames[sealIndex];
        }

        function getWavespellInfo(kinNumber) {
            // 找出所屬波符
            let wavespellIndex = 0;
            for (let i = wavespellStartKins.length - 1; i >= 0; i--) {
                if (kinNumber >= wavespellStartKins[i]) {
                    wavespellIndex = i;
                    break;
                }
            }
            const wavespellName = wavespellNames[wavespellIndex];
            const positionInWavespell = kinNumber - wavespellStartKins[wavespellIndex] + 1;
            return { wavespellName, positionInWavespell };
        }

        function formatDate(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            return `${year} / ${month} / ${day}`;
        }

        // 計算當天 KIN（年份表計算法）
        // 規則：總和 = 年份值 + 月份值 + 日期值，若 > 260 則減 260
        function getTodayKin() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth() + 1; // 1-12
            const day = today.getDate();
            return calculateKIN(year, month, day);
        }

        // KIN 計算函數
        function calculateKIN(year, month, day) {
            // 月份值固定表
            const monthTable = {
                1: 0, 2: 31, 3: 59, 4: 90, 5: 120, 6: 151,
                7: 181, 8: 212, 9: 243, 10: 13, 11: 44, 12: 74
            };

            // 年份值計算：以 1939 年 = 247 為基準，每年加 105（閏日不計入）
            // 計算方式：(247 + (year - 1939) * 105) % 260
            const baseYear = 1939;
            const baseValue = 247;
            const yearDiff = year - baseYear;
            let yearValue = (baseValue + yearDiff * 105) % 260;
            if (yearValue <= 0) yearValue += 260;

            const monthValue = monthTable[month];
            const dayValue = day;

            let sum = yearValue + monthValue + dayValue;

            // 若總和 > 260，則減 260（可能需要減多次）
            while (sum > 260) {
                sum -= 260;
            }

            return sum;
        }

        // ==================== State 管理 ====================

        let currentState = 1;
        let drawnKin = null;
        let drawInterval = null;
        let currentDrawKin = 1;

        function switchStage(currentId, nextId, callback) {
            const current = document.getElementById(currentId);
            const next = document.getElementById(nextId);

            current.style.animation = 'fadeOut 0.5s ease forwards';

            setTimeout(() => {
                current.classList.remove('active');
                current.style.animation = '';
                next.classList.add('active');
                if (callback) callback();
            }, 500);
        }

        // ==================== State 1：當天印記校準 ====================

        function initCalibrate() {
            const todayKin = getTodayKin();
            const sealNumber = getSealNumber(todayKin);
            const colorClass = getKinColorClass(todayKin);

            // 設定日期
            document.getElementById('calibrateDate').textContent = formatDate(new Date());

            // 設定圖騰圖片
            const sealImageNum = sealNumber.toString().padStart(2, '0');
            document.getElementById('calibrateSeal').src = `../images/${sealImageNum}.png`;

            // 設定 KIN 資訊
            document.getElementById('calibrateKin').textContent = `KIN ${todayKin}`;
            document.getElementById('calibrateKin').className = `calibrate-kin ${colorClass}`;
            document.getElementById('calibrateName').textContent = getKinName(todayKin);
            document.getElementById('calibrateName').className = `calibrate-name ${colorClass}`;

            // 5 秒後自動進入下一階段
            setTimeout(() => {
                switchStage('stageCalibrate', 'stageBreathe', initBreathe);
            }, 5000);
        }

        // ==================== State 2：呼吸過渡 ====================

        let breathCount = 0;
        const maxBreaths = 3;
        let audioContext = null;

        // 呼吸計數名稱
        const breathCountNames = ["第一次呼吸", "第二次呼吸", "第三次呼吸"];

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放吸氣聲音
        function playInhaleSound() {
            if (!audioContext) return;
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 220; // A3
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, audioContext.currentTime + 1);
                gainNode.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + 3);
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 4);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 4);
            } catch(e) { console.log('Audio error:', e); }
        }

        // 播放吐氣聲音
        function playExhaleSound() {
            if (!audioContext) return;
            try {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                oscillator.frequency.value = 165; // E3
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.15, audioContext.currentTime + 1);
                gainNode.gain.linearRampToValueAtTime(0.05, audioContext.currentTime + 3);
                gainNode.gain.linearRampToValueAtTime(0, audioContext.currentTime + 4);
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 4);
            } catch(e) { console.log('Audio error:', e); }
        }

        function initBreathe() {
            breathCount = 0;
            initAudioContext();
            // 嘗試播放背景音樂（需要用戶互動後才能播放）
            const bgMusic = document.getElementById('bgMusic');
            if (bgMusic.src) {
                bgMusic.play().catch(() => {});
            }
            breathCycle();
        }

        function breathCycle() {
            if (breathCount >= maxBreaths) {
                setTimeout(() => {
                    switchStage('stageBreathe', 'stageDraw', initDraw);
                }, 1000);
                return;
            }

            const circle = document.getElementById('breathCircle');
            const text = document.getElementById('breathText');
            const countText = document.getElementById('breathCount');

            // 更新呼吸次數顯示
            countText.textContent = breathCountNames[breathCount];

            // 吸氣
            circle.className = 'breath-circle inhale';
            text.textContent = '吸氣';
            playInhaleSound();

            setTimeout(() => {
                // 吐氣
                circle.className = 'breath-circle exhale';
                text.textContent = '吐氣';
                playExhaleSound();

                setTimeout(() => {
                    breathCount++;
                    breathCycle();
                }, 4000);
            }, 4000);
        }

        // ==================== State 3：抽卡儀式 ====================

        function initDraw() {
            // 建立左爾金曆格子（20行 × 13列 = 260格）
            // 排列規則：行 = 圖騰(1-20)，列 = 調性(1-13)
            // KIN 計算：KIN = (列-1) * 20 + 行
            // 所以 KIN 1 = 左上角，KIN 260 = 右下角
            const tzolkinDisplay = document.getElementById('tzolkinDisplay');
            tzolkinDisplay.innerHTML = '';

            // CSS grid 依序填充（左到右、上到下）
            // 格子 i 的位置：row = floor(i/13), col = i%13
            // 對應的 KIN = col * 20 + row + 1
            for (let i = 0; i < 260; i++) {
                const row = Math.floor(i / 13);  // 0-19（圖騰索引）
                const col = i % 13;              // 0-12（調性索引）
                const kin = col * 20 + row + 1;  // KIN 1-260

                const cell = document.createElement('div');
                cell.className = 'tzolkin-cell';
                cell.dataset.kin = kin;
                tzolkinDisplay.appendChild(cell);
            }

            // 開始跑馬燈
            startKinRolling();
        }

        function startKinRolling() {
            const kinDisplay = document.getElementById('drawKinDisplay');
            const tzolkinDisplay = document.getElementById('tzolkinDisplay');
            kinDisplay.classList.add('rolling');

            drawInterval = setInterval(() => {
                // 隨機跳動
                currentDrawKin = Math.floor(Math.random() * 260) + 1;
                kinDisplay.textContent = `KIN ${currentDrawKin}`;

                // 更新左爾金曆高亮（用 data-kin 屬性找格子）
                const cells = tzolkinDisplay.querySelectorAll('.tzolkin-cell');
                cells.forEach(cell => {
                    cell.className = 'tzolkin-cell';
                });

                const colorClass = getKinColorClass(currentDrawKin);
                const targetCell = tzolkinDisplay.querySelector(`.tzolkin-cell[data-kin="${currentDrawKin}"]`);
                if (targetCell) {
                    targetCell.classList.add('highlight', colorClass.replace('kin-', ''));
                }
            }, 80);
        }

        function stopDraw() {
            if (!drawInterval) return;

            clearInterval(drawInterval);
            drawInterval = null;

            const kinDisplay = document.getElementById('drawKinDisplay');
            kinDisplay.classList.remove('rolling');

            // 記錄抽到的 KIN
            drawnKin = currentDrawKin;

            // 在左爾金曆上標示最終位置並停留
            const tzolkinDisplay = document.getElementById('tzolkinDisplay');
            const cells = tzolkinDisplay.querySelectorAll('.tzolkin-cell');
            cells.forEach(cell => {
                cell.className = 'tzolkin-cell';
            });

            const colorClass = getKinColorClass(drawnKin);
            const targetCell = tzolkinDisplay.querySelector(`.tzolkin-cell[data-kin="${drawnKin}"]`);
            if (targetCell) {
                targetCell.classList.add('highlight', colorClass.replace('kin-', ''));
                // 添加脈動動畫效果
                targetCell.style.animation = 'tzolkinPulse 0.5s ease 2';
            }

            // 左爾金定位停留 0.8 秒後再進入下一階段
            setTimeout(() => {
                switchStage('stageDraw', 'stageReveal', initReveal);
            }, 800);
        }

        // ==================== State 4：印記顯現 ====================

        function initReveal() {
            const sealNumber = getSealNumber(drawnKin);
            const sealImageNum = sealNumber.toString().padStart(2, '0');
            document.getElementById('revealSeal').src = `../images/${sealImageNum}.png`;

            // 停留 4 秒後進入下一階段
            setTimeout(() => {
                switchStage('stageReveal', 'stageWavespell', initWavespell);
            }, 4000);
        }

        // ==================== State 5：波符位置 ====================

        function initWavespell() {
            const sealNumber = getSealNumber(drawnKin);
            const colorClass = getKinColorClass(drawnKin);
            const wavespellInfo = getWavespellInfo(drawnKin);
            const bodyInfo = sealBodyParts[sealNumber];
            const message = sealMessages[sealNumber];

            // 設定圖騰圖片
            const sealImageNum = sealNumber.toString().padStart(2, '0');
            document.getElementById('wavespellSeal').src = `../images/${sealImageNum}.png`;

            // 設定 KIN 資訊
            document.getElementById('wavespellKin').textContent = `KIN ${drawnKin}`;
            document.getElementById('wavespellKin').className = `wavespell-kin ${colorClass}`;
            document.getElementById('wavespellName').textContent = getKinName(drawnKin);
            document.getElementById('wavespellName').className = `wavespell-name ${colorClass}`;

            // 設定共時訊息
            document.getElementById('wavespellMessage').textContent = message;

            // 設定身體連結
            document.getElementById('wavespellBodyPart').textContent = `${bodyInfo.name}｜${bodyInfo.part}`;
            document.getElementById('wavespellBodyInvitation').textContent = bodyInfo.invitation;

            // 設定波符資訊
            document.getElementById('wavespellValue').textContent = wavespellInfo.wavespellName;
            document.getElementById('wavespellPosition').textContent = `第 ${wavespellInfo.positionInWavespell} 天`;

            // 建立波符視覺化（13天）
            const visualContainer = document.getElementById('wavespellVisual');
            visualContainer.innerHTML = '';
            for (let i = 1; i <= 13; i++) {
                const day = document.createElement('div');
                day.className = 'wavespell-day';
                if (i === wavespellInfo.positionInWavespell) {
                    day.classList.add('current', colorClass);
                }
                visualContainer.appendChild(day);
            }
        }

        // ==================== 重新開始 ====================

        function restart() {
            // 重置狀態
            drawnKin = null;
            currentDrawKin = 1;
            breathCount = 0;

            // 清除所有 active
            document.querySelectorAll('.stage').forEach(stage => {
                stage.classList.remove('active');
                stage.style.animation = '';
            });

            // 回到 State 1
            document.getElementById('stageCalibrate').classList.add('active');
            initCalibrate();
        }

        // ==================== 初始化 ====================

        document.addEventListener('DOMContentLoaded', () => {
            initCalibrate();
        });
    </script>
